<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Maltrail</title>
<link rel="stylesheet" href="css/main.css?v=<!ASSETVER!>">
</head>
<body data-tz="<!TZOFFSET!>">
<header>
  <div class="brand"><span class="brandlogo" aria-label="Maltrail"><!LOGO!></span><small>// network threat monitor</small></div>
  <div class="period-nav">
    <button class="navbtn" id="prev_day" title="previous day" aria-label="previous day">‹</button>
    <span class="dot"></span>
    <input type="date" id="date_input" class="date-input" aria-label="select day">
    <button class="navbtn" id="next_day" title="next day" aria-label="next day">›</button>
  </div>
  <div class="spacer"></div>
  <div class="search">⌕ <input id="filter" placeholder="search…  type:dns,http  port:443,>1024  src:10.0.0.0/8  count:>=100  trail:*.ru  sev:high  -exclude  (space = AND)" autocomplete="off"><button class="search-clear" id="search_clear" title="clear search" aria-label="clear search" style="display:none">✕</button><button class="qhelp-btn" id="qhelp" title="search syntax help" aria-label="search syntax help">?</button></div>
  <div class="textsize" role="group" aria-label="text size">
    <button class="ghost-btn icon" id="fz_dec" title="decrease text size" aria-label="decrease text size">A−</button>
    <button class="ghost-btn icon" id="fz_inc" title="increase text size" aria-label="increase text size">A+</button>
  </div>
  <button class="ghost-btn icon dash-toggle" id="stats_toggle" aria-controls="stats" aria-pressed="true" title="hide dashboard cards" aria-label="hide dashboard cards"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></button>
  <button class="ghost-btn icon" id="theme_toggle" title="toggle light / dark" aria-label="toggle light or dark theme">☾</button>
  <button class="ghost-btn" id="login_link">Log in</button>
</header>

<main>
  <section class="stats" id="stats"></section>

  <div id="chart_area"></div>

  <div class="toolbar">
    <span id="sevfilter" class="sevfilter"></span>
    <span id="chips" class="chiprow"></span>
    <span id="count" class="resultcount"></span>
    <span id="newpill" class="newpill" style="display:none" role="status"></span>
    <div class="spacer"></div>
    <div class="seg" id="seg-size"><button data-size="25" class="on">25</button><button data-size="50">50</button><button data-size="100">100</button></div>
    <div class="seg" id="seg-density"><button data-density="comfortable" class="on">comfortable</button><button data-density="compact">compact</button></div>
    <button class="ghost-btn xport live" id="live_btn" title="live auto-refresh + alerts on new high-severity" aria-label="toggle live auto-refresh" aria-pressed="false">● live</button>
    <button class="ghost-btn xport mute-btn" id="mute_btn" title="mute new-threat beeps" aria-label="mute new-threat beeps" aria-pressed="false"></button>
    <button class="ghost-btn xport" id="views_btn" title="saved views / presets" aria-label="saved views">★ views</button>
    <button class="ghost-btn xport" id="export_btn" title="export current view (CSV / JSON / IOCs)" aria-label="export current view">↓ export</button>
  </div>

  <div class="grid-wrap">
    <table id="grid">
      <thead><tr>
        <th data-key="sev">severity</th><th data-key="uid">threat</th><th data-key="count">activity</th><th data-key="src">source</th><th data-key="dst">destination</th>
        <th data-key="dport">port</th><th data-key="type">type</th><th data-key="trail">trail</th><th data-key="info">info</th><th data-key="first">first seen</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div id="pager" class="pager" role="navigation" aria-label="threat pages"></div>
</main>

<div id="drawer_scrim" class="drawer-scrim"></div>
<aside id="drawer" class="drawer" role="dialog" aria-label="threat detail"></aside>
<div id="ctxmenu" class="ctxmenu" role="menu" aria-hidden="true"></div>
<footer>Powered by <b>maltrail</b> · <span class="ver"><!VERSION!></span> · <a href="#" id="shortcuts_link" class="foot-link">⌨ shortcuts</a></footer>

<script src="js/demo.js"></script>
<script src="js/thirdparty.min.js"></script>
<script src="js/main.js?v=<!ASSETVER!>"></script>

</body>
</html>
