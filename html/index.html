<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<meta name="robots" content="noindex, nofollow">
<title>Maltrail</title>
<link rel="stylesheet" href="css/main.css?v=<!ASSETVER!>">
</head>
<body data-tz="<!TZOFFSET!>">
<header>
  <button class="hamburger" id="nav_menu" title="menu" aria-label="menu" aria-haspopup="true" aria-expanded="false"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="brand"><span class="brandlogo" aria-label="Maltrail"><!LOGO!></span><small>// network threat monitor</small></div>
  <div class="period-nav">
    <button class="navbtn" id="prev_day" title="previous day" aria-label="previous day">‹</button>
    <span class="dateface" id="dateface" title="pick a day">
      <span class="df-top" id="df_top"></span>
      <span class="df-bot" id="df_bot"></span>
      <input type="date" id="date_input" aria-label="select day">
    </span>
    <button class="navbtn" id="next_day" title="next day" aria-label="next day">›</button>
  </div>
  <div class="search">⌕ <input id="filter" placeholder="search…  type:dns,http  port:443,>1024  src:10.0.0.0/8  count:>=100  trail:*.ru  sev:high  -exclude  (space = AND)" autocomplete="off"><button class="search-clear" id="search_clear" title="clear search" aria-label="clear search" style="display:none">✕</button><button class="qhelp-btn" id="qhelp" title="search syntax help" aria-label="search syntax help">?</button></div>
  <div class="spacer"></div>
  <span class="vsep" aria-hidden="true"></span>
  <div class="viewtools" role="group" aria-label="appearance">
    <div class="textsize">
      <button class="ghost-btn icon" id="fz_dec" title="decrease text size" aria-label="decrease text size">A−</button>
      <button class="ghost-btn icon" id="fz_inc" title="increase text size" aria-label="increase text size">A+</button>
    </div>
    <button class="ghost-btn icon" id="theme_toggle" title="toggle light / dark" aria-label="toggle light or dark theme">☾</button>
    <button class="ghost-btn icon dash-toggle" id="view_toggle" aria-controls="stats worldmap" title="show attack map" aria-label="show attack map"><svg class="ic-dash" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg><svg class="ic-map" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.5 3.8 5.7 3.8 9s-1.3 6.5-3.8 9c-2.5-2.5-3.8-5.7-3.8-9s1.3-6.5 3.8-9z"/></svg></button>
    <button class="ghost-btn icon dash-toggle" id="collapse_toggle" aria-controls="stats worldmap" aria-expanded="true" title="hide panel" aria-label="hide panel"><svg class="ic-chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg></button>
  </div>
  <button class="ghost-btn" id="login_link">Log in</button>
</header>

<main>
  <section class="stats" id="stats"></section>

  <div id="chart_area"></div>

  <section class="worldmap" id="worldmap" aria-label="attack origins map" hidden></section>

  <div class="toolbar">
    <span id="sevfilter" class="sevfilter"></span>
    <span id="chips" class="chiprow"></span>
    <span id="count" class="resultcount"></span>
    <span id="newpill" class="newpill" style="display:none" role="status"></span>
    <div class="spacer"></div>
    <div class="seg" id="seg-size"><button data-size="25" class="on">25</button><button data-size="50">50</button><button data-size="100">100</button></div>
    <button class="ghost-btn xport live" id="live_btn" title="live auto-refresh + alerts on new high-severity" aria-label="toggle live auto-refresh" aria-pressed="false">● live</button>
    <button class="ghost-btn xport mute-btn" id="mute_btn" title="mute new-threat beeps" aria-label="mute new-threat beeps" aria-pressed="false"></button>
    <button class="ghost-btn xport" id="views_btn" title="saved views / presets" aria-label="saved views">★ views</button>
    <button class="ghost-btn xport" id="export_btn" title="export current view (CSV / JSON / IOCs)" aria-label="export current view">↓ export</button>
  </div>

  <div class="grid-frame">
  <div class="grid-wrap">
    <table id="grid">
      <thead><tr>
        <th data-key="uid">threat</th><th data-key="sensor">sensor</th><th data-key="count">events</th><th data-key="sev">severity</th><th class="sparkcol">sparkline</th><th data-key="src">source</th><th data-key="dst">destination</th>
        <th data-key="dport">port</th><th data-key="type">type</th><th data-key="trail">trail</th><th data-key="info">info</th><th data-key="first">first seen</th><th class="tagcol">tags</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  </div>
  <div id="pager" class="pager" role="navigation" aria-label="threat pages"></div>
</main>

<div id="drawer_scrim" class="drawer-scrim"></div>
<aside id="drawer" class="drawer" role="dialog" aria-label="threat detail"></aside>
<div id="ctxmenu" class="ctxmenu" role="menu" aria-hidden="true"></div>
<footer>Powered by <b>maltrail</b> · <span class="ver"><!VERSION!></span> · <a href="#" id="shortcuts_link" class="foot-link">⌨ shortcuts</a></footer>

<script src="js/demo.js"></script>
<script src="js/thirdparty.min.js"></script>
<script src="js/worldmap.js"></script>
<script src="js/main.js?v=<!ASSETVER!>"></script>

</body>
</html>
